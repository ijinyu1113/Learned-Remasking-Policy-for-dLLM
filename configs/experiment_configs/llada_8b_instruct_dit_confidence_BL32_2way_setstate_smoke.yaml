# Smoke-test variant of BL32_2way_setstate.yaml — reduced batch sizes so the
# integration can be exercised end-to-end on a single 24GB card. Not for
# real training. Only the batch-size knobs differ from the main config.
torch_dtype: bfloat16
load_in_4bit: false
model_path: GSAI-ML/LLaDA-8B-Instruct

attn_implementation: sdpa

dataset: gsm8k_and_math
seed: 123
bf16: false

adam_beta1: 0.9
adam_beta2: 0.99
weight_decay: 0.1
max_grad_norm: 0.2

use_vllm: false
vllm_device: auto
vllm_gpu_memory_utilization: 0.9

warmup_steps: 100
logging_steps: 1
learning_rate: 3e-5
lr_scheduler_type: cosine
reward_functions:
  - mixed_correctness_mult_reward_func
  - mixed_correctness_reward_func
reward_weights:
  - 1.0
  - 0.0

# Smoke-test-only batch reductions
num_generations: 2               # was 8 (must divide effective_batch_size = 2)
num_train_epochs: 1
per_device_eval_batch_size: 1
per_device_train_batch_size: 2   # was 8
gradient_accumulation_steps: 1
generation_batch_size: 2         # was 8
timestep_batch_size: 4           # was 16

gradient_checkpointing: false
gradient_checkpointing_kwargs:
  use_reentrant: false

resume_from_checkpoint: false    # smoke: don't auto-resume

save_steps: 5
save_strategy: steps
save_total_limit: 2

max_completion_length: 128       # was 256, halve to fit smaller VRAM
max_prompt_length: 200
block_length: 32
remasking: policy
beta: 0.
epsilon: 0.5
num_iterations: 2
loglikelihood_dtype: float32

# Policy specific
policy_type: dit_confidence_pcurrent
policy_hidden_dim: 128
policy_feedforward_dim: 512
policy_num_heads: 2
policy_num_blocks: 1
policy_dropout: 0.0
policy_time_embed_dim: 128
policy_full_context: true
policy_smart_init: -2.0

# 2-way set-state
sampling_mode: two_way_setstate
num_policy_actions: 1
confidences_top_p: 1
alpha_compute_reward: 0.0
alpha_correctness_reward: 1.0
entropy_coef: 0.001
setstate_remask_conf_prior: 0.0
prob_n_freqs: 8
