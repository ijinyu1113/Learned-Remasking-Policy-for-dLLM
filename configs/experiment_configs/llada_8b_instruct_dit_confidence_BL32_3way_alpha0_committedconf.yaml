# 3-way config with the confidence-input fix:
# At unmasked positions, the policy's confidence input is probs[i, committed_token]
# instead of probs.topk(1).values. This gives a real "is the commit wrong?" signal
# for the REMASK action. Conf-aware REMASK prior also uses the same signal so it
# suppresses remasking only at confidently-correct positions.
#
# Used by Run 1 (warm-start) and Run 3 (cold-start).
# For Run 2, use the _lowprior variant.
torch_dtype: bfloat16
load_in_4bit: false
model_path: GSAI-ML/LLaDA-8B-Instruct

attn_implementation: sdpa

dataset: gsm8k_and_math
seed: 123
bf16: false

adam_beta1: 0.9
adam_beta2: 0.99
weight_decay: 0.1
max_grad_norm: 0.2

use_vllm: false
vllm_device: auto
vllm_gpu_memory_utilization: 0.9

warmup_steps: 100
logging_steps: 1
learning_rate: 3e-5
lr_scheduler_type: cosine
reward_functions:
  - mixed_correctness_mult_reward_func
  - mixed_correctness_reward_func
reward_weights:
  - 1.0
  - 0.0

num_generations: 8
num_train_epochs: 1

per_device_eval_batch_size: 1
per_device_train_batch_size: 8
gradient_accumulation_steps: 1

gradient_checkpointing: false
gradient_checkpointing_kwargs:
  use_reentrant: false

resume_from_checkpoint: true

save_steps: 50
save_strategy: steps
save_total_limit: 500

max_completion_length: 256
max_prompt_length: 200
block_length: 32
generation_batch_size: 8
remasking: policy
beta: 0.
epsilon: 0.5
num_iterations: 2
loglikelihood_dtype: float32
timestep_batch_size: 16

policy_type: dit_confidence
policy_hidden_dim: 128
policy_feedforward_dim: 512
policy_num_heads: 2
policy_num_blocks: 1
policy_dropout: 0.0
policy_time_embed_dim: 128
policy_full_context: true
policy_smart_init: -2.0

sampling_mode: three_way
num_policy_actions: 3
alpha_compute_reward: 0.0
alpha_correctness_reward: 1.0
entropy_coef: 0.001

# ===== confidence-fix knobs =====
# At unmasked positions, feed p(committed_token) instead of top-1 prob.
use_committed_token_conf: true
# Conf prior coefficient. With the corrected signal, 5.0 strongly suppresses
# REMASK at confidently-correct commits while leaving REMASK at disagreed-with
# commits (low p(committed)) only mildly suppressed.
remask_conf_prior_strength: 5.0
